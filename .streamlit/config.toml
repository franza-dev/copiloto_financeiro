[theme]
# A cor principal da sua marca (usada nos botões de destaque, gráficos, etc.)
primaryColor = "#FF4B4B" # Altere para o código HEX (ex: azul escuro ou dourado do seu site)

# A cor do fundo da tela inteira
backgroundColor = "#0E1117" # Exemplo de Dark Mode elegante

# A cor de fundo da barra lateral (Sidebar) e das caixinhas (Expanders)
secondaryBackgroundColor = "#262730"

# A cor do texto
textColor = "#FAFAFA"

# A fonte (opções: "sans serif", "serif", "monospace")
font = "sans serif"