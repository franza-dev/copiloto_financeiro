services:
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      - EVOLUTION_API_URL=https://evolution-evolution-api.yijtjr.easypanel.host
      - EVOLUTION_API_KEY=D29D9664210A-49D4-BC14-FC3345AE894D
      - EVOLUTION_INSTANCE=Guido
      - ASAAS_API_KEY=${ASAAS_API_KEY}
    restart: always

  frontend:
    build: .
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    environment:
      - API_URL=http://api:8000
    env_file: .env
    depends_on:
      - api
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./site:/var/www/guido-site:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
    restart: always

  # WhatsApp — Evolution API (gateway de mensagens)
  # Evolution API roda no servidor do sócio (externo).
  # URL/key configurados via environment no serviço 'api'.

  # Serviço on-demand — roda só quando for emitir/renovar certificado
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt

volumes:
  certbot-www:
  certbot-conf:
