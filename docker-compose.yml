services:
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=6G0wq9IrB5EweYBFaetFBh96p8J9bUZKJGGe6_2G9MY
      - EVOLUTION_INSTANCE=guido
    restart: always

  frontend:
    build: .
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    environment:
      - API_URL=http://api:8000
    env_file: .env
    depends_on:
      - api
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./site:/var/www/guido-site:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
    restart: always

  # WhatsApp — Evolution API (gateway de mensagens)
  # PostgreSQL local só pro Evolution API (isolado do Neon do app)
  evolution-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evo_guido_2026
      - POSTGRES_DB=evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    restart: always

  evolution-api:
    image: atendai/evolution-api:v2.2.3
    environment:
      - SERVER_URL=http://evolution-api:8080
      - AUTHENTICATION_API_KEY=6G0wq9IrB5EweYBFaetFBh96p8J9bUZKJGGe6_2G9MY
      - WEBHOOK_GLOBAL_URL=http://api:8000/whatsapp/webhook
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evo_guido_2026@evolution-db:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - LOG_LEVEL=WARN
    ports:
      - "8080:8080"
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      - evolution-db
    restart: always

  # Serviço on-demand — roda só quando for emitir/renovar certificado
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt

volumes:
  certbot-www:
  certbot-conf:
  evolution_data:
  evolution_db_data:
