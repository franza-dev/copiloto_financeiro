# ==========================================
# Guido — nginx com site institucional + app + HTTPS
#
# chamaoguido.com       → site HTML estático
# app.chamaoguido.com   → Streamlit (Guido app)
# ambos                 → /api/ proxy pro FastAPI
#
# Renovação do cert: docker compose run --rm certbot renew
# ==========================================

# DNS interno do Docker — re-resolve upstreams a cada 30s
# (impede 502 quando docker compose recria containers e IPs mudam)

# --- HTTP (porta 80): ACME challenge + redirect HTTPS ---
server {
    listen 80;
    server_name chamaoguido.com www.chamaoguido.com app.chamaoguido.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: SITE INSTITUCIONAL (chamaoguido.com + www) ---
server {
    listen 443 ssl;
    http2 on;
    server_name chamaoguido.com www.chamaoguido.com;

    ssl_certificate     /etc/letsencrypt/live/chamaoguido.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chamaoguido.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Site estático
    root /var/www/guido-site;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # API também disponível no domínio principal (pro checkout JS)
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /api/ {
        set $api_upstream "api:8000";
        proxy_pass http://$api_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- HTTPS: GUIDO APP (app.chamaoguido.com) ---
server {
    listen 443 ssl;
    http2 on;
    server_name app.chamaoguido.com;

    ssl_certificate     /etc/letsencrypt/live/chamaoguido.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chamaoguido.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Frontend Streamlit
    location / {
        set $frontend_upstream "frontend:8501";
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # API FastAPI
    # rewrite necessário porque proxy_pass com variável ($api_upstream)
    # não faz URI replacement automático — sem o rewrite, /api/whatsapp/webhook
    # chega no FastAPI como /api/whatsapp/webhook (404) em vez de /whatsapp/webhook.
    location /api/ {
        set $api_upstream "api:8000";
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Compat: IP direto vai pro domínio ---
server {
    listen 80 default_server;
    server_name 185.139.1.136 _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://chamaoguido.com$request_uri;
    }
}
