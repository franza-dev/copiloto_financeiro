# ==========================================
# Guido — nginx com HTTPS via Let's Encrypt
# Renovação automática: docker compose run --rm certbot renew
# ==========================================

# --- HTTP (porta 80): serve ACME challenge + redirect pra HTTPS ---
server {
    listen 80;
    server_name chamaoguido.com www.chamaoguido.com;

    # ACME challenge precisa continuar acessível via HTTP pra renovação
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo o resto vai pra HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS (porta 443): app de verdade ---
server {
    listen 443 ssl;
    http2 on;
    server_name chamaoguido.com www.chamaoguido.com;

    ssl_certificate     /etc/letsencrypt/live/chamaoguido.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chamaoguido.com/privkey.pem;

    # Boas práticas de TLS
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — força HTTPS em visitas futuras (1 ano)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Frontend Streamlit
    location / {
        proxy_pass http://frontend:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # API FastAPI
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Compat: quem ainda chega pelo IP vai pro domínio ---
server {
    listen 80 default_server;
    server_name 185.139.1.136 _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://chamaoguido.com$request_uri;
    }
}
